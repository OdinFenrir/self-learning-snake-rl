name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt
          python -m pip install -r requirements-dev.txt

      - name: Lint
        shell: pwsh
        run: python -m ruff check snake_frame tests main.py

      - name: Tests
        shell: pwsh
        run: python -m pytest -q -m "not render"

      - name: Render Regression
        shell: pwsh
        run: python -m pytest -q -m render
