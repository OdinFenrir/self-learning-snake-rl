name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt
          python -m pip install -r requirements-dev.txt

      - name: Lint
        shell: pwsh
        run: python -m ruff check scripts snake_frame tests main.py

      - name: Contract + Orchestration Tests
        shell: pwsh
        run: python -m pytest -q tests/test_reporting_common.py tests/test_report_contracts.py tests/test_analysis_tool_orchestration.py

      - name: Tests
        shell: pwsh
        run: python -m pytest -q -m "not render"

      - name: Render Regression
        shell: pwsh
        run: python -m pytest -q -m render
